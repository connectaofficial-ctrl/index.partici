<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>connec+a</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1c2340;--ink-mid:#2a3d7a;--ink-soft:#5a6a9a;--ink-pale:#c4ceec;
  --bg:#f7f8fc;--bg2:#eef0f8;--white:#fff;
  --rose:#e8a0b8;--violet:#7060a8;--amber:#c85a20;--sky:#7aa8cc;
  --green:#3d6640;--border:rgba(42,61,122,.12);
  --s1:0 2px 12px rgba(28,35,64,.07);--s2:0 6px 28px rgba(28,35,64,.12);--s3:0 16px 48px rgba(28,35,64,.18);
  --r:16px;--rs:10px;
}
html{scroll-behavior:smooth;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;line-height:1.6;}
[dir="rtl"]{direction:rtl;text-align:right;}
::selection{background:rgba(112,96,168,.2);color:var(--ink);}

/* ═══ ICON SYSTEM ═══ */
.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon svg{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.icon-sm svg{width:14px;height:14px;}.icon-md svg{width:18px;height:18px;}.icon-lg svg{width:22px;height:22px;}.icon-xl svg{width:28px;height:28px;}

/* ═══ SKELETON SHIMMER ═══ */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,rgba(255,255,255,.75) 50%,var(--bg2) 75%);background-size:1200px 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:6px;}
.skel-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--s1);display:flex;margin-bottom:14px;overflow:hidden;opacity:0;animation:fadein .35s ease forwards;}
.skel-card:nth-child(1){animation-delay:.04s}.skel-card:nth-child(2){animation-delay:.10s}.skel-card:nth-child(3){animation-delay:.16s}
.skel-accent-bar{width:5px;flex-shrink:0;}.skel-body{flex:1;padding:18px;}

/* ═══ BACKGROUND ATMOSPHERE ═══ */
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(232,160,184,.16) 0%,transparent 55%),
             radial-gradient(ellipse 60% 50% at 90% 100%,rgba(122,168,204,.14) 0%,transparent 55%),var(--bg);}
.bg-noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.petals{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.petal{position:absolute;opacity:0;animation:petalFall linear infinite;}
@keyframes petalFall{0%{transform:translateY(-10px) rotate(0deg);opacity:0}6%{opacity:.4}94%{opacity:.2}100%{transform:translateY(105vh) rotate(600deg) translateX(30px);opacity:0}}
.season-bar{height:3px;background:linear-gradient(90deg,var(--rose) 0%,var(--violet) 33%,var(--amber) 66%,var(--sky) 100%);position:relative;z-index:101;}

/* ═══ HEADER ═══ */
.header{position:sticky;top:0;z-index:100;background:rgba(247,248,252,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:box-shadow .3s;}
.header.scrolled{box-shadow:0 4px 20px rgba(28,35,64,.1);}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;transition:opacity .2s;}.logo:hover{opacity:.8;}
.logo-icon{width:30px;height:30px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.55rem;color:#fff;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.logo:hover .logo-icon{transform:rotate(-8deg) scale(1.12);}
.logo-name{font-family:"Noto Serif JP",serif;font-size:.95rem;color:var(--ink);font-weight:700;letter-spacing:.06em;}
.logo-name span{color:var(--violet);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.lang-sel{padding:4px 9px;border-radius:99px;font-size:.7rem;border:1.5px solid var(--border);background:transparent;color:var(--ink-mid);cursor:pointer;outline:none;font-family:"Noto Sans JP",sans-serif;transition:border-color .2s;}
.lang-sel:hover{border-color:var(--ink-mid);}
.av-btn{width:32px;height:32px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.72rem;color:#fff;font-weight:700;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;position:relative;}
.av-btn:hover{transform:scale(1.12);box-shadow:0 4px 16px rgba(28,35,64,.3);}
.av-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#f59e0b;border-radius:50%;border:2px solid var(--bg);display:none;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.guest-btns{display:flex;gap:8px;}
.g-btn{padding:6px 16px;border-radius:99px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s cubic-bezier(.34,1.56,.64,1);border:none;}
.g-btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--border);}.g-btn-ghost:hover{border-color:var(--violet);color:var(--violet);}
.g-btn-fill{background:var(--ink);color:#fff;box-shadow:0 2px 8px rgba(28,35,64,.2);}.g-btn-fill:hover{background:var(--ink-mid);transform:translateY(-2px);}

/* ═══ BOTTOM NAV ═══ */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(247,248,252,.96);backdrop-filter:blur(18px);border-top:1px solid var(--border);height:62px;display:none;align-items:center;justify-content:space-around;}
.bnav.show{display:flex;}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;cursor:pointer;border:none;background:none;color:var(--ink-soft);font-family:"Noto Sans JP",sans-serif;border-radius:var(--rs);transition:color .25s;position:relative;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:transform .28s cubic-bezier(.34,1.56,.64,1);}
.bn:hover svg{transform:translateY(-3px) scale(1.1);}.bn.act{color:var(--violet);}.bn.act svg{stroke:var(--violet);}
.bn span{font-size:.6rem;font-weight:600;letter-spacing:.03em;}
.bn-dot{position:absolute;top:6px;right:10px;width:7px;height:7px;background:#f59e0b;border-radius:50%;border:2px solid var(--bg);display:none;}
.bn-dot.on{display:block;animation:pulse 2s ease infinite;}

/* ═══ PAGES ═══ */
.pg{display:none;position:relative;z-index:2;padding-bottom:80px;}
.pg.on{display:block;animation:pgIn .32s cubic-bezier(.4,0,.2,1) both;}
@keyframes pgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadein{to{opacity:1}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.mx{max-width:720px;margin:0 auto;padding:0 20px;}

/* ═══ RIPPLE ═══ */
.rpl{position:relative;overflow:hidden;}.rpl-w{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rpl .65s linear;pointer-events:none;}
@keyframes rpl{to{transform:scale(4);opacity:0}}

/* ═══ HERO ═══ */
.hero{text-align:center;padding:52px 20px 32px;}
.hero-label{font-size:.62rem;letter-spacing:.38em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;}
.hero-label::before,.hero-label::after{content:"";width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--ink-pale));}
.hero-label::after{background:linear-gradient(90deg,var(--ink-pale),transparent);}
.hero-title{font-family:"Noto Serif JP",serif;font-size:clamp(1.7rem,5vw,2.8rem);font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:12px;}
.hero-title em{font-style:normal;color:var(--violet);}
.hero-desc{font-size:.88rem;color:var(--ink-soft);line-height:1.9;max-width:360px;margin:0 auto 24px;}
.season-dots{display:flex;height:4px;max-width:200px;margin:0 auto 32px;gap:3px;}
.sd{flex:1;border-radius:99px;}
.auth-cta{display:flex;justify-content:center;gap:12px;margin-bottom:48px;flex-wrap:wrap;}

/* ═══ SEARCH & FILTER ═══ */
.search-wrap{position:relative;margin-bottom:10px;}
.search-in{width:100%;padding:10px 16px 10px 42px;border:1.5px solid var(--border);border-radius:99px;font-size:.88rem;color:var(--ink);background:var(--white);outline:none;transition:all .22s;font-family:"Noto Sans JP",sans-serif;box-shadow:var(--s1);}
.search-in:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(112,96,168,.12),var(--s1);}
.search-in::placeholder{color:rgba(90,106,154,.4);}
.search-ic{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;}
.search-ic svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.flt-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.flt{padding:5px 14px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:.72rem;font-weight:600;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s cubic-bezier(.34,1.56,.64,1);}
.flt:hover{border-color:var(--ink-soft);transform:translateY(-1px);}
.flt.on{background:var(--ink);color:#fff;border-color:var(--ink);transform:translateY(-1px);box-shadow:0 3px 10px rgba(28,35,64,.2);}

/* ═══ CALENDAR ═══ */
.cal-row{max-width:720px;margin:0 auto 14px;padding:0 20px;display:none;align-items:center;gap:10px;}.cal-row.show{display:flex;}
.cal-btn{padding:6px 16px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:.74rem;font-weight:600;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s;display:inline-flex;align-items:center;gap:4px;}
.cal-btn:hover{border-color:var(--ink-mid);}.cal-btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.rt-badge{font-size:.66rem;color:var(--green);font-weight:600;padding:3px 10px;background:rgba(61,102,64,.08);border-radius:99px;display:inline-flex;align-items:center;gap:5px;}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:rtpulse 1.8s ease infinite;}
@keyframes rtpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.cal-panel{max-width:720px;margin:0 auto 18px;padding:0 20px;}
.cal-inner{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--s1);padding:18px;animation:cardIn .28s ease both;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-family:"Noto Serif JP",serif;font-size:.95rem;font-weight:700;color:var(--ink);}
.cal-nav{background:none;border:1.5px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .22s;color:var(--ink-soft);}
.cal-nav:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.cal-nav svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:.62rem;font-weight:700;color:var(--ink-soft);padding:5px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.78rem;border-radius:8px;cursor:pointer;transition:all .18s;color:var(--ink);position:relative;}
.cal-day:hover{background:var(--bg2);}.cal-day.other{color:var(--ink-pale);cursor:default;}.cal-day.today{background:rgba(112,96,168,.1);color:var(--violet);font-weight:700;}
.cal-day.has-ev::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--violet);}
.cal-day.sel{background:var(--ink)!important;color:#fff!important;font-weight:700;}

/* ═══ USER BAR ═══ */
.user-bar{max-width:680px;margin:0 auto 18px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--s1);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.ub-left{display:flex;align-items:center;gap:12px;}
.ub-av{width:38px;height:38px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.85rem;color:#fff;font-weight:700;flex-shrink:0;}

/* ═══ EVENT CARDS ═══ */
.ev-grid{display:flex;flex-direction:column;gap:14px;}
.ev-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--border);overflow:hidden;display:flex;position:relative;opacity:0;animation:cardIn .42s ease both;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s;cursor:pointer;}
.ev-card:hover{transform:translateY(-4px) scale(1.007);box-shadow:var(--s2);}
.ev-card:nth-child(1){animation-delay:.04s}.ev-card:nth-child(2){animation-delay:.09s}.ev-card:nth-child(3){animation-delay:.14s}.ev-card:nth-child(4){animation-delay:.19s}.ev-card:nth-child(5){animation-delay:.24s}
.ev-accent{width:5px;flex-shrink:0;}
.ev-card:nth-child(4n+1) .ev-accent{background:linear-gradient(180deg,var(--rose),#c06080);}
.ev-card:nth-child(4n+2) .ev-accent{background:linear-gradient(180deg,var(--violet),#402880);}
.ev-card:nth-child(4n+3) .ev-accent{background:linear-gradient(180deg,var(--amber),#803010);}
.ev-card:nth-child(4n) .ev-accent{background:linear-gradient(180deg,var(--sky),#3870a8);}
.ev-body{padding:16px 18px;flex:1;min-width:0;}
.ev-season{font-size:.58rem;letter-spacing:.22em;color:var(--ink-soft);text-transform:uppercase;font-weight:600;margin-bottom:3px;}
.ev-name{font-family:"Noto Serif JP",serif;font-size:1.02rem;font-weight:700;color:var(--ink);margin-bottom:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-date{font-size:.74rem;color:var(--ink-soft);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.ev-meta{display:flex;gap:16px;flex-wrap:wrap;}.ev-kv{display:flex;flex-direction:column;}.ev-k{font-size:.66rem;color:var(--ink-soft);}.ev-v{font-size:.8rem;font-weight:600;color:var(--ink-mid);}
.ev-actions{padding:14px 14px 14px 0;display:flex;align-items:center;flex-shrink:0;}
.map-link{display:inline-flex;align-items:center;gap:4px;color:var(--violet);font-size:.76rem;cursor:pointer;text-decoration:none;transition:opacity .2s;}
.map-link:hover{opacity:.7;text-decoration:underline;}.map-link svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}

/* ═══ SOCIAL ═══ */
.ev-social{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg2);flex-wrap:wrap;}
.soc-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:.72rem;font-weight:600;color:var(--ink-soft);font-family:"Noto Sans JP",sans-serif;transition:all .22s cubic-bezier(.34,1.56,.64,1);}
.soc-btn:hover{transform:scale(1.07);}
.soc-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all .2s;}
.soc-btn.liked{border-color:var(--rose);background:rgba(232,160,184,.12);color:#c06080;}.soc-btn.liked svg{stroke:#c06080;fill:#c06080;}
.soc-btn.bm-on{border-color:var(--violet);background:rgba(112,96,168,.1);color:var(--violet);}.soc-btn.bm-on svg{stroke:var(--violet);fill:var(--violet);}
.cmt-section{padding:0 18px 14px;animation:cardIn .25s ease both;}
.cmt-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;max-height:160px;overflow-y:auto;}
.cmt-item{background:var(--bg2);border-radius:var(--rs);padding:7px 11px;font-size:.78rem;color:var(--ink);}
.cmt-author{font-weight:700;color:var(--ink-mid);margin-right:5px;}.cmt-time{font-size:.65rem;color:var(--ink-soft);}
.cmt-row{display:flex;gap:7px;}
.cmt-input{flex:1;padding:7px 12px;border:1.5px solid var(--border);border-radius:99px;font-size:.82rem;outline:none;font-family:"Noto Sans JP",sans-serif;background:var(--bg);transition:border-color .2s;}.cmt-input:focus{border-color:var(--violet);}
.cmt-send{padding:7px 13px;border-radius:99px;border:none;background:var(--violet);color:#fff;font-size:.74rem;font-weight:700;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .2s;white-space:nowrap;}.cmt-send:hover{background:var(--ink);}

.reg-badge{font-size:.63rem;font-weight:700;padding:4px 10px;border-radius:99px;cursor:pointer;white-space:nowrap;transition:transform .2s;display:inline-flex;align-items:center;gap:4px;}
.reg-badge:hover{transform:scale(1.06);}
.reg-badge-p{background:var(--ink);color:#fff;}.reg-badge-c{background:var(--green);color:#fff;}
.btn-ev{padding:9px 16px;border-radius:99px;font-size:.76rem;font-weight:700;border:none;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);font-family:"Noto Sans JP",sans-serif;white-space:nowrap;position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:5px;}
.btn-ev:hover{filter:brightness(1.12);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.2);}
.btn-ev svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-ev-r{background:linear-gradient(135deg,var(--rose),#c06080);color:#fff;}
.btn-ev-v{background:linear-gradient(135deg,var(--violet),#402880);color:#fff;}
.btn-ev-a{background:linear-gradient(135deg,var(--amber),#803010);color:#fff;}
.btn-ev-s{background:linear-gradient(135deg,var(--sky),#3870a8);color:#fff;}
.btn-ev-o{padding:8px 14px;border-radius:99px;font-size:.74rem;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);cursor:default;font-family:"Noto Sans JP",sans-serif;}

/* ═══ COMMON ═══ */
.spinner{width:34px;height:34px;border:3px solid var(--bg2);border-top-color:var(--violet);border-radius:50%;animation:spin .8s linear infinite;margin:28px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.section-head-text{font-family:"Noto Serif JP",serif;font-size:.85rem;font-weight:700;color:var(--ink-soft);letter-spacing:.2em;text-transform:uppercase;white-space:nowrap;}
.section-head-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);padding:22px;margin-bottom:16px;border:1px solid var(--border);}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.68rem;font-weight:700;}
.badge-free{background:rgba(61,102,64,.1);color:var(--green);}.badge-paid{background:rgba(112,96,168,.1);color:var(--violet);}.badge-full{background:rgba(200,90,32,.1);color:var(--amber);}
.badge-new{background:linear-gradient(135deg,var(--violet),var(--rose));color:#fff;}.badge-global{background:rgba(112,96,168,.1);color:var(--violet);}.badge-personal{background:rgba(232,160,184,.25);color:#c06080;}
.alert{padding:11px 14px;border-radius:var(--rs);font-size:.82rem;margin-bottom:14px;line-height:1.7;}
.alert-ok{background:#f0fdf4;border-left:3px solid #22c55e;color:#15803d;}
.alert-err{background:rgba(200,90,32,.06);border-left:3px solid var(--amber);color:#7a2010;}
.alert-info{background:rgba(112,96,168,.07);border-left:3px solid var(--violet);color:var(--ink-mid);}
.fg{margin-bottom:16px;}
.fl{display:block;font-size:.74rem;font-weight:700;color:var(--ink-mid);margin-bottom:6px;letter-spacing:.04em;}
.fl-opt{font-size:.68rem;font-weight:400;color:var(--ink-soft);margin-left:6px;}
.fc{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.9rem;color:var(--ink);background:var(--bg);outline:none;transition:all .2s;font-family:"Noto Sans JP",sans-serif;}
.fc:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(112,96,168,.12);background:var(--white);}
.fc[readonly]{background:var(--bg2);cursor:default;}
.btn-full{width:100%;padding:12px;border-radius:99px;font-size:.9rem;font-weight:700;border:none;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 4px 16px rgba(28,35,64,.2);transition:all .28s cubic-bezier(.34,1.56,.64,1);font-family:"Noto Sans JP",sans-serif;position:relative;overflow:hidden;}
.btn-full:hover{background:var(--ink-mid);transform:translateY(-2px);}.btn-full:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.ghost-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);cursor:pointer;font-family:"Noto Sans JP",sans-serif;font-size:.76rem;margin-bottom:14px;transition:all .22s cubic-bezier(.34,1.56,.64,1);}
.ghost-btn:hover{border-color:var(--ink-mid);color:var(--ink);transform:translateX(-2px);}
.ghost-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}

/* ═══ AUTH ═══ */
.auth-wrap{min-height:calc(100vh - 59px);display:flex;align-items:center;justify-content:center;padding:24px 16px;}
.auth-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s3);border:1px solid var(--border);width:100%;max-width:420px;overflow:hidden;animation:cardIn .38s ease both;}
.auth-card-bar{height:4px;background:linear-gradient(90deg,var(--rose),var(--violet),var(--amber),var(--sky));}
.auth-card-body{padding:36px 36px 32px;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo-icon{width:48px;height:48px;background:var(--ink);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.72rem;color:#fff;font-weight:700;margin:0 auto 10px;box-shadow:0 4px 16px rgba(28,35,64,.2);}
.auth-logo-name{font-family:"Noto Serif JP",serif;font-size:1.35rem;font-weight:700;color:var(--ink);letter-spacing:.06em;}.auth-logo-name span{color:var(--violet);}
.auth-logo-sub{font-size:.68rem;color:var(--ink-soft);letter-spacing:.2em;margin-top:2px;}
.auth-title{font-family:"Noto Serif JP",serif;font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:20px;text-align:center;}
.auth-footer{text-align:center;margin-top:16px;font-size:.74rem;color:var(--ink-soft);}
.auth-link{color:var(--violet);cursor:pointer;font-weight:700;}.auth-link:hover{text-decoration:underline;}
.auth-div{border:none;border-top:1px solid var(--border);margin:20px 0;}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ═══ REFERRAL ═══ */
.ref-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.ref-chip{padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--ink-soft);font-size:.76rem;font-weight:600;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s;display:inline-flex;align-items:center;gap:5px;}
.ref-chip:hover{border-color:var(--ink-soft);transform:translateY(-1px);}
.ref-chip.on{background:var(--violet);color:#fff;border-color:var(--violet);}

/* ═══ PAYMENT ═══ */
.pay-group{background:var(--bg2);border-radius:var(--rs);padding:14px;margin-bottom:8px;border:1px solid var(--border);}
.pay-group-h{font-size:.76rem;font-weight:700;color:var(--ink-soft);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em;}
.pay-group-h svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.pay-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--rs);cursor:pointer;margin-bottom:4px;border:1.5px solid transparent;transition:all .15s;font-size:.86rem;}
.pay-opt:hover{background:var(--white);border-color:var(--border);}
.pay-opt.on{background:rgba(112,96,168,.06);border-color:var(--violet);}
.pay-opt input[type="radio"]{accent-color:var(--violet);width:16px;height:16px;}
.pay-free{background:rgba(61,102,64,.06);border:1px solid rgba(61,102,64,.18);border-radius:var(--rs);padding:14px;text-align:center;color:var(--green);font-weight:700;font-size:.88rem;display:flex;align-items:center;justify-content:center;gap:8px;}
.pay-free svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
.pay-link{display:block;width:100%;padding:14px;border-radius:99px;border:none;background:linear-gradient(135deg,var(--violet),#7c3aed);color:#fff;font-weight:700;font-size:.92rem;cursor:pointer;font-family:"Noto Sans JP",sans-serif;text-align:center;margin-top:14px;transition:all .2s;box-shadow:0 4px 14px rgba(112,96,168,.2);}
.pay-link:hover{transform:translateY(-2px);}

/* ═══ POST-REG MESSAGE ═══ */
.post-msg{background:rgba(112,96,168,.05);border:1px solid rgba(112,96,168,.15);border-radius:var(--rs);padding:16px;margin-top:14px;font-size:.84rem;color:var(--ink-mid);line-height:1.8;}
.post-msg-h{font-weight:700;font-size:.88rem;color:var(--ink);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.post-msg-h svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}

/* ═══ TICKET ═══ */
.ticket{border:1.5px dashed rgba(28,35,64,.18);border-radius:var(--r);padding:22px;text-align:center;margin:16px 0;position:relative;}
.ticket::before,.ticket::after{content:"";position:absolute;width:18px;height:18px;background:var(--bg);border-radius:50%;top:50%;transform:translateY(-50%);border:1.5px dashed rgba(28,35,64,.18);}
.ticket::before{left:-10px;}.ticket::after{right:-10px;}
.ticket-label{font-family:"Noto Serif JP",serif;font-size:.7rem;font-weight:700;color:var(--ink-soft);margin-bottom:12px;letter-spacing:.18em;display:flex;align-items:center;justify-content:center;gap:6px;}
.ticket-label svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.ticket-id{font-size:.62rem;color:var(--ink-soft);font-family:monospace;word-break:break-all;background:var(--bg2);padding:5px 9px;border-radius:6px;display:block;text-align:center;margin:6px 0;}

/* ═══ CUSTOM QUESTIONS ═══ */
.cq{margin-bottom:14px;padding:14px;background:rgba(112,96,168,.03);border:1px solid rgba(112,96,168,.1);border-radius:var(--rs);}
.cq-label{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:8px;}
.cq-opts{display:flex;flex-direction:column;gap:6px;}
.cq-opt{display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--ink-mid);cursor:pointer;}
.cq-opt input{accent-color:var(--violet);}

/* ═══ RATING 10-SCALE ═══ */
.rate-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.rate-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:.82rem;font-weight:700;color:var(--ink-soft);transition:all .2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;}
.rate-btn:hover{border-color:var(--violet);color:var(--violet);transform:scale(1.08);}
.rate-btn.on{background:var(--violet);color:#fff;border-color:var(--violet);transform:scale(1.08);box-shadow:0 3px 10px rgba(112,96,168,.3);}
.rate-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--ink-soft);margin-bottom:12px;}

/* ═══ MY PAGE — PROFILE CARD ═══ */
.prof-card{border-radius:var(--r);padding:20px 22px;margin-bottom:16px;background:var(--ink);color:#fff;position:relative;overflow:hidden;}
.prof-card::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 65% 70% at 5% 15%,rgba(232,160,184,.22) 0%,transparent 60%),radial-gradient(ellipse 55% 60% at 92% 85%,rgba(112,96,168,.22) 0%,transparent 60%);}
.prof-card-z{position:relative;z-index:1;}
.prof-hdr{display:flex;align-items:center;gap:13px;margin-bottom:18px;}
.prof-av{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:1.1rem;color:#fff;font-weight:700;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);cursor:default;}
.prof-av:hover{transform:scale(1.12) rotate(-5deg);}
.prof-info{flex:1;}.prof-name{font-family:"Noto Serif JP",serif;font-size:1.1rem;font-weight:700;margin-bottom:2px;}.prof-email{font-size:.72rem;opacity:.5;}
.prof-edit{padding:5px 13px;border-radius:99px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.75);font-size:.72rem;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.prof-edit:hover{background:rgba(255,255,255,.18);transform:scale(1.05);}
.prof-edit svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}
.prof-stats{display:flex;border-top:1px solid rgba(255,255,255,.12);padding-top:16px;}
.ps{flex:1;text-align:center;}.ps+.ps{border-left:1px solid rgba(255,255,255,.12);}
.ps-n{font-size:1.5rem;font-weight:800;line-height:1;}.ps-l{font-size:.62rem;opacity:.5;margin-top:3px;}

/* ═══ QUICK ACTION GRID ═══ */
.qg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.qb{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 6px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--white);transition:all .25s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:var(--s1);}
.qb:hover{transform:translateY(-3px);box-shadow:var(--s2);}.qb:active{transform:translateY(-1px) scale(.97);}
.qb.on{border-color:var(--violet);background:rgba(112,96,168,.04);}
.qi{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.qb:hover .qi{transform:scale(1.14);}
.qi svg{width:18px;height:18px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ql{font-size:.68rem;font-weight:700;color:var(--ink-soft);text-align:center;line-height:1.3;}
.qbadge{position:absolute;top:8px;right:8px;min-width:16px;height:16px;background:#f59e0b;border-radius:99px;border:2px solid var(--bg);display:none;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;color:#fff;padding:0 3px;}
.qbadge.show{display:flex;animation:badgePop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}
.tpane{display:none;}.tpane.on{display:block;animation:pgIn .28s ease both;}

/* ═══ ICON CIRCLES ═══ */
.ic-blue{background:#E6F1FB;}.ic-blue svg{stroke:#185FA5;}
.ic-amber{background:#FAEEDA;}.ic-amber svg{stroke:#854F0B;}
.ic-violet{background:#EEEDFE;}.ic-violet svg{stroke:#534AB7;}
.ic-pink{background:#FBEAF0;}.ic-pink svg{stroke:#993556;}

/* ═══ TIMELINE ═══ */
.timeline{display:flex;flex-direction:column;}
.tl{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--bg2);}.tl:last-child{border-bottom:none;}
.tl-left{display:flex;flex-direction:column;align-items:center;gap:4px;}
.tl-dot{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--rose));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tl-dot svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;}
.tl-line{width:2px;flex:1;background:var(--bg2);min-height:16px;}
.tl-body{flex:1;}.tl-ev{font-weight:700;font-size:.88rem;color:var(--ink);margin-bottom:2px;}.tl-date{font-size:.72rem;color:var(--ink-soft);}
.tl-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:.64rem;font-weight:700;background:rgba(61,102,64,.1);color:var(--green);margin-top:4px;}
.tl-badge svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.5;}
.chart-wrap{position:relative;height:220px;margin-top:8px;}

/* ═══ SURVEY ═══ */
.sf{background:linear-gradient(135deg,rgba(232,160,184,.1),rgba(112,96,168,.07));border:1px solid rgba(232,160,184,.28);border-radius:var(--rs);padding:14px;margin-bottom:12px;}
.sf h4{font-family:"Noto Serif JP",serif;font-size:.86rem;font-weight:700;color:var(--ink);margin-bottom:8px;}
.sd-done{background:rgba(61,102,64,.07);border:1px solid rgba(61,102,64,.2);border-radius:var(--rs);padding:10px 14px;font-size:.78rem;color:var(--green);margin-bottom:10px;}

/* ═══ CHAT ═══ */
.chat-wrap{display:flex;flex-direction:column;height:380px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg2);}
.cbbl{max-width:78%;display:flex;flex-direction:column;gap:3px;}
.cbbl.me{align-self:flex-end;align-items:flex-end;}.cbbl.them{align-self:flex-start;align-items:flex-start;}
.bsender{font-size:.66rem;font-weight:700;color:var(--ink-soft);margin-bottom:2px;padding:0 4px;}
.bt{padding:10px 14px;border-radius:var(--r);font-size:.88rem;line-height:1.6;word-break:break-word;animation:bubIn .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes bubIn{from{transform:scale(.9) translateY(4px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.cbbl.me .bt{background:var(--ink);color:#fff;border-radius:var(--r) var(--r) 4px var(--r);}
.cbbl.them .bt{background:var(--white);color:var(--ink);border:1px solid var(--border);border-radius:var(--r) var(--r) var(--r) 4px;}
.bmeta{font-size:.62rem;color:var(--ink-soft);padding:0 4px;}
.b-tr{font-size:.72rem;color:var(--violet);padding:2px 4px;cursor:pointer;font-weight:600;}.b-tr:hover{color:var(--ink);text-decoration:underline;}
.chat-in-row{display:flex;gap:8px;padding:10px 12px;background:var(--white);border-top:1px solid var(--border);}
.chat-in{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:99px;font-size:.88rem;outline:none;font-family:"Noto Sans JP",sans-serif;background:var(--bg);transition:border-color .2s;resize:none;max-height:80px;}
.chat-in:focus{border-color:var(--violet);background:var(--white);}
.chat-send{padding:10px 18px;border-radius:99px;border:none;background:var(--ink);color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;gap:5px;}
.chat-send:hover{background:var(--ink-mid);transform:scale(1.05);}
.chat-send svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-soft);font-size:.85rem;gap:8px;padding:20px;}

/* ═══ NEWS ═══ */
.news-card{background:var(--white);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--border);padding:20px;margin-bottom:12px;transition:all .28s cubic-bezier(.34,1.56,.64,1);cursor:pointer;position:relative;overflow:hidden;animation:cardIn .4s ease both;}
.news-card:hover{transform:translateY(-3px);box-shadow:var(--s2);}
.news-card.unread::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--violet),var(--rose));}
.news-card-h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;}
.news-title{font-family:"Noto Serif JP",serif;font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.4;}
.news-body{font-size:.82rem;color:var(--ink-soft);line-height:1.8;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.news-empty{text-align:center;padding:60px 20px;color:var(--ink-soft);}

/* ═══ PHOTOS ═══ */
.ph-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.ph-item{aspect-ratio:1;border-radius:var(--rs);overflow:hidden;position:relative;cursor:pointer;background:var(--bg2);border:1px solid var(--border);animation:cardIn .4s ease both;}
.ph-item img{width:100%;height:100%;object-fit:cover;transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.ph-item:hover img{transform:scale(1.08);}
.ph-overlay{position:absolute;inset:0;background:rgba(28,35,64,.42);display:none;align-items:center;justify-content:center;}
.ph-item:hover .ph-overlay{display:flex;}
.ph-overlay svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
.upload-zone{border:2px dashed var(--ink-pale);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);background:rgba(112,96,168,.03);margin-bottom:16px;}
.upload-zone:hover{border-color:var(--violet);background:rgba(112,96,168,.06);transform:translateY(-2px);}
.upload-text{font-size:.85rem;color:var(--ink-soft);line-height:1.8;}.upload-text strong{color:var(--violet);}

/* ═══ MODAL / OVERLAY ═══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(28,35,64,.6);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.overlay.on{display:flex;animation:mfade .2s ease;}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.mdl{background:var(--white);border-radius:var(--r);padding:26px;max-width:480px;width:100%;box-shadow:var(--s3);animation:mdlIn .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;}
@keyframes mdlIn{from{transform:scale(.88) translateY(14px);opacity:0}to{transform:scale(1);opacity:1}}
.mdl-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.mdl-title{font-family:"Noto Serif JP",serif;font-size:1rem;font-weight:700;color:var(--ink);}
.mdl-x{background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:4px;transition:transform .22s;display:flex;align-items:center;justify-content:center;}
.mdl-x:hover{transform:rotate(90deg);}.mdl-x svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}

/* ═══ PHOTO VIEWER ═══ */
.pv{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);align-items:center;justify-content:center;cursor:pointer;}
.pv.on{display:flex;animation:mfade .2s ease;}
.pv img{max-width:92vw;max-height:88vh;border-radius:var(--rs);object-fit:contain;animation:mdlIn .3s cubic-bezier(.34,1.56,.64,1);}
.pv-x{position:absolute;top:18px;right:20px;background:rgba(255,255,255,.15);border:none;cursor:pointer;color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .22s;}
.pv-x:hover{background:rgba(255,255,255,.28);transform:rotate(90deg) scale(1.1);}
.pv-x svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}

/* ═══ EVENT DETAIL PAGE ═══ */
.det-hero{position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.det-carousel{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg2);overflow:hidden;}
.det-carousel img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .5s ease;}
.det-carousel img.active{opacity:1;}
.det-carousel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2;}
.det-carousel-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;}
.det-carousel-dot.on{background:#fff;transform:scale(1.3);}
.det-carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(28,35,64,.5);color:#fff;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .2s;backdrop-filter:blur(4px);}
.det-carousel-nav:hover{background:rgba(28,35,64,.7);}
.det-carousel-nav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
.det-carousel-nav.prev{left:10px;}.det-carousel-nav.next{right:10px;}
.det-no-poster{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--ink),var(--ink-mid));display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.6);gap:8px;}
.det-no-poster svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.5;}

.det-header{padding:20px 0;}
.det-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.det-cat{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:99px;font-size:.72rem;font-weight:600;border:1.5px solid var(--border);color:var(--ink-mid);background:var(--white);}
.det-cat svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.det-title{font-family:"Noto Serif JP",serif;font-size:1.5rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:8px;}
.det-date-row{display:flex;align-items:center;gap:8px;font-size:.86rem;color:var(--ink-soft);margin-bottom:6px;}
.det-date-row svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.det-price-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.det-seats{font-size:.8rem;color:var(--ink-soft);display:flex;align-items:center;gap:4px;}
.det-seats svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

.det-section{margin-bottom:24px;}
.det-section-h{font-family:"Noto Serif JP",serif;font-size:.9rem;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.det-section-h svg{width:18px;height:18px;stroke:var(--violet);fill:none;stroke-width:2;flex-shrink:0;}

/* Detail: Description */
.det-desc{font-size:.88rem;color:var(--ink-mid);line-height:2;white-space:pre-wrap;word-break:break-word;}

/* Detail: Notice */
.det-notice{background:rgba(200,160,32,.08);border:1px solid rgba(200,160,32,.2);border-radius:var(--rs);padding:14px 16px;font-size:.84rem;color:#6b4a00;line-height:1.8;}

/* Detail: Timeline Schedule */
.det-tl{display:flex;flex-direction:column;gap:0;}
.det-tl-item{display:flex;gap:14px;position:relative;}
.det-tl-item:not(:last-child)::after{content:"";position:absolute;left:15px;top:32px;bottom:-4px;width:2px;background:var(--bg2);}
.det-tl-time{width:60px;flex-shrink:0;font-size:.76rem;font-weight:700;color:var(--violet);padding-top:6px;text-align:right;}
.det-tl-dot{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--rose));display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1;}
.det-tl-dot svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;}
.det-tl-body{flex:1;padding:4px 0 20px;}
.det-tl-title{font-weight:700;font-size:.86rem;color:var(--ink);margin-bottom:2px;}
.det-tl-desc{font-size:.78rem;color:var(--ink-soft);}

/* Detail: Bring / Dresscode */
.det-items{display:flex;flex-direction:column;gap:8px;}
.det-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:var(--rs);font-size:.84rem;color:var(--ink);}
.det-item svg{width:16px;height:16px;stroke:var(--violet);fill:none;stroke-width:2;flex-shrink:0;}

/* Detail: Map & Access */
.det-map{border-radius:var(--rs);overflow:hidden;height:220px;border:1px solid var(--border);margin-bottom:14px;}
.det-map iframe{width:100%;height:100%;border:0;}
.det-access{display:flex;flex-direction:column;gap:8px;}
.det-station{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);font-size:.84rem;}
.det-station svg{width:18px;height:18px;stroke:var(--violet);fill:none;stroke-width:2;flex-shrink:0;}
.det-station-name{font-weight:700;color:var(--ink);}
.det-station-walk{font-size:.76rem;color:var(--ink-soft);margin-left:auto;}

/* Detail: Staff */
.det-staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.det-staff-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;transition:transform .2s,box-shadow .2s;}
.det-staff-card:hover{transform:translateY(-3px);box-shadow:var(--s2);}
.det-staff-av{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:1.1rem;color:#fff;font-weight:700;background:var(--ink);}
.det-staff-card img.det-staff-photo{width:56px;height:56px;border-radius:50%;object-fit:cover;margin:0 auto 10px;display:block;}
.det-staff-name{font-weight:700;font-size:.84rem;color:var(--ink);margin-bottom:2px;}
.det-staff-role{font-size:.72rem;color:var(--ink-soft);}
.det-staff-bio{font-size:.72rem;color:var(--ink-soft);margin-top:6px;line-height:1.6;}

/* Detail: Org banner (connec+a shared) */
.det-org-banner{background:var(--ink);color:#fff;border-radius:var(--r);padding:24px;position:relative;overflow:hidden;}
.det-org-banner::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 65% 70% at 5% 15%,rgba(232,160,184,.2) 0%,transparent 60%),radial-gradient(ellipse 55% 60% at 92% 85%,rgba(112,96,168,.2) 0%,transparent 60%);}
.det-org-z{position:relative;z-index:1;}
.det-org-logo{width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.72rem;font-weight:700;margin-bottom:12px;}
.det-org-name{font-family:"Noto Serif JP",serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.det-org-desc{font-size:.82rem;opacity:.7;line-height:1.8;}

/* Detail: Custom org card */
.det-custom-org{border-radius:var(--r);padding:24px;position:relative;overflow:hidden;}
.det-custom-org-title{font-family:"Noto Serif JP",serif;font-size:1.1rem;font-weight:700;margin-bottom:6px;}
.det-custom-org-desc{font-size:.82rem;line-height:1.8;opacity:.85;}
.det-custom-org img{max-width:100%;border-radius:var(--rs);margin-top:12px;}

/* Detail: FAQ */
.det-faq{display:flex;flex-direction:column;gap:8px;}
.det-faq-item{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;transition:box-shadow .2s;}
.det-faq-item:hover{box-shadow:var(--s1);}
.det-faq-q{padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:.86rem;font-weight:700;color:var(--ink);}
.det-faq-q svg{width:16px;height:16px;stroke:var(--ink-soft);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0;}
.det-faq-q.open svg{transform:rotate(180deg);}
.det-faq-a{padding:0 16px 14px;font-size:.82rem;color:var(--ink-soft);line-height:1.8;display:none;}
.det-faq-a.open{display:block;animation:pgIn .2s ease both;}

/* Detail: Past photos */
.det-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
.det-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--rs);cursor:pointer;transition:transform .2s;border:1px solid var(--border);}
.det-photos img:hover{transform:scale(1.05);}

/* Detail: Register CTA */
.det-cta{position:sticky;bottom:72px;z-index:10;padding:12px 0;}
.det-cta-inner{display:flex;gap:12px;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:99px;padding:8px 8px 8px 20px;box-shadow:var(--s2);}
.det-cta-price{font-weight:700;font-size:.9rem;color:var(--ink);flex-shrink:0;}
.det-cta-btn{flex:1;padding:12px 24px;border-radius:99px;border:none;background:var(--ink);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s;text-align:center;}
.det-cta-btn:hover{background:var(--ink-mid);transform:translateY(-1px);}
.det-cta-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ═══ LOGOUT ═══ */
.btn-logout{width:100%;padding:11px;border-radius:99px;border:1.5px solid rgba(200,90,32,.25);background:transparent;color:var(--amber);font-size:.84rem;font-weight:700;cursor:pointer;font-family:"Noto Sans JP",sans-serif;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-logout:hover{background:rgba(200,90,32,.06);transform:translateY(-1px);}
.btn-logout svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}

.empty{text-align:center;padding:48px 20px;color:var(--ink-soft);font-size:.88rem;animation:cardIn .3s ease both;}

@media(max-width:600px){
  .header{padding:0 14px;}.auth-card-body{padding:26px 22px 24px;}
  .ev-card{flex-direction:column;}.ev-accent{width:100%;height:4px;}.ev-actions{padding:0 14px 14px;justify-content:flex-end;}
  .ph-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
  .qg{gap:8px;}.qi{width:38px;height:38px;}.rate-btn{width:30px;height:30px;font-size:.75rem;}
  .res-grid{grid-template-columns:1fr;}
}
</style>

// CALENDAR
function toggleCal(){calVis=!calVis;var p=document.getElementById("cal-panel"),b=document.getElementById("cal-btn");if(calVis){p.style.display="block";renderCal();b.classList.add("on");}else{p.style.display="none";calSel=null;b.classList.remove("on");renderEvents();}}
function renderCal(){var p=document.getElementById("cal-panel");if(!p)return;var y=calDt.getFullYear(),m=calDt.getMonth();var first=new Date(y,m,1),last=new Date(y,m+1,0);var dows=["日","月","火","水","木","金","土"];var months=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];var today=new Date();var evDates={};allEv.forEach(function(ev){if(!ev.Date)return;try{var ds=ev.Date.replace(/年/g,"-").replace(/月/g,"-").replace(/日/g,"").replace(/\//g,"-").trim();var pts=ds.split("-");if(pts.length>=3){var k=parseInt(pts[0])+"-"+(parseInt(pts[1])-1)+"-"+parseInt(pts[2]);if(!evDates[k])evDates[k]=[];evDates[k].push(ev);}}catch(e){}});var cells="";var sd=first.getDay();for(var i=0;i<sd;i++)cells+='<div class="cal-day other"></div>';for(var d=1;d<=last.getDate();d++){var k=y+"-"+m+"-"+d;var isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;var isS=calSel&&calSel.y===y&&calSel.m===m&&calSel.d===d;var hasE=!!(evDates[k]&&evDates[k].length);cells+='<div class="cal-day'+(isT?" today":"")+(hasE?" has-ev":"")+(isS?" sel":"")+'" onclick="selCalDay('+y+','+m+','+d+')">'+d+'</div>';}p.innerHTML='<div class="cal-inner"><div class="cal-hdr"><button class="cal-nav" onclick="shiftCal(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button><span class="cal-month">'+y+'年 '+months[m]+'</span><button class="cal-nav" onclick="shiftCal(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button></div><div class="cal-grid">'+dows.map(function(d){return'<div class="cal-dow">'+d+'</div>';}).join("")+cells+'</div></div>';}
function shiftCal(d){calDt.setMonth(calDt.getMonth()+d);renderCal();}
function selCalDay(y,m,d){if(calSel&&calSel.y===y&&calSel.m===m&&calSel.d===d)calSel=null;else calSel={y:y,m:m,d:d};renderCal();renderEvents();}

// SOCIAL
function getLk(id){return lsGet("lk_"+id)||{n:0,me:false};}
function togLk(id){var l=getLk(id);l.me=!l.me;l.n=Math.max(0,l.me?l.n+1:l.n-1);lsSet("lk_"+id,l);return l;}
function isBm(id){return(lsGet("bms")||[]).includes(id);}
function togBm(id){var b=lsGet("bms")||[];var i=b.indexOf(id);if(i>=0)b.splice(i,1);else b.push(id);lsSet("bms",b);return b.includes(id);}
function getCmts(id){return lsGet("cm_"+id)||[];}

function loadNotif(){document.getElementById("tp-notif").innerHTML='<div class="empty">'+t("mp_notif_none")+'</div>';}

// CHAT WITH TRANSLATE
function loadChat(){var el=document.getElementById("tp-chat");if(!curUser){el.innerHTML="";return;}var msgs=(lsGet("cpa_chat")||[]).filter(function(m){return m.senderId===curUser.ParticipantID||m.receiverId===curUser.ParticipantID;}).sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});el.innerHTML='<div class="chat-wrap"><div class="chat-msgs" id="ch-msgs">'+(msgs.length?msgs.map(function(m){var mine=m.senderId===curUser.ParticipantID;var time=new Date(m.createdAt).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});return'<div class="cbbl '+(mine?"me":"them")+'">'+(mine?'':'<div class="bsender">'+t("mp_chat_operator")+'</div>')+'<div class="bt">'+esc(m.text)+'</div><div class="bmeta">'+time+'</div>'+(mine?'':'<div class="b-tr" onclick="trMsg(this,\''+esc(m.text.replace(/'/g,"\\'"))+'\')">'+t("translate_btn")+'</div>')+'</div>';}).join(""):'<div class="chat-empty">'+ICONS.msg+'<p>'+t("mp_chat_empty")+'<br><small>'+t("mp_chat_sub")+'</small></p></div>')+'</div><div class="chat-in-row"><input class="chat-in" id="ch-in" placeholder="'+t("mp_chat_placeholder")+'" onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="chat-send" onclick="sendMsg()">'+ICONS.send+' '+t("mp_chat_send")+'</button></div></div>';setTimeout(function(){var c=document.getElementById("ch-msgs");if(c)c.scrollTop=c.scrollHeight;},100);}
function sendMsg(){var inp=document.getElementById("ch-in");var text=(inp.value||"").trim();if(!text||!curUser)return;var all=lsGet("cpa_chat")||[];all.push({id:Date.now()+"",senderId:curUser.ParticipantID,receiverId:"ADMIN",senderName:curUser.Name,text:text,createdAt:new Date().toISOString(),isRead:false});lsSet("cpa_chat",all);inp.value="";loadChat();}
async function trMsg(el,text){el.textContent="翻訳中...";try{var r=await api("translateText",{text:text,targetLang:curLang});el.textContent=r.translated||"翻訳できませんでした";el.style.color="var(--ink)";el.style.fontWeight="400";el.style.cursor="default";}catch(e){el.textContent="翻訳エラー";}}
function renderEdit(){if(!curUser)return;var p=curUser;var langs=["ja","en","zh","ko","es","fr","pt","id","th","vi","ar","hi","de","it","ru"];var lNames={ja:"日本語",en:"English",zh:"中文",ko:"한국어",es:"Español",fr:"Français",pt:"Português",id:"Bahasa",th:"ไทย",vi:"Tiếng Việt",ar:"العربية",hi:"हिन्दी",de:"Deutsch",it:"Italiano",ru:"Русский"};document.getElementById("tp-edit").innerHTML='<div id="pe-al"></div><div class="fg"><label class="fl">'+t("label_name")+'</label><input id="pe-name" class="fc" value="'+esc(p.Name||"")+'"></div><div class="fg"><label class="fl">'+t("label_email")+'</label><input id="pe-email" class="fc" value="'+esc(p.Email||"")+'"></div><div class="fg"><label class="fl">'+t("mp_lang")+'</label><select id="pe-lang" class="fc" onchange="setLang(this.value)">'+langs.map(function(l){return'<option value="'+l+'"'+(curLang===l?" selected":"")+'>'+lNames[l]+'</option>';}).join("")+'</select></div><button class="btn-full rpl" onclick="saveProf()">'+t("btn_save")+'</button>';}
async function saveProf(){var al=document.getElementById("pe-al");al.innerHTML="";var name=document.getElementById("pe-name").value.trim();if(!name){al.innerHTML='<div class="alert alert-err">'+t("err_no_name")+'</div>';return;}try{await api("updateParticipantProfile",{participantId:curUser.ParticipantID,name:name});curUser.Name=name;sessionStorage.setItem("auth_user",JSON.stringify(curUser));updateHdr(curUser);al.innerHTML='<div class="alert alert-ok">'+t("msg_saved")+'</div>';}catch(e){al.innerHTML='<div class="alert alert-err">'+esc(e.message)+'</div>';}}

// PHOTOS
async function loadPhotos(){var chips=document.getElementById("ph-chips"),content=document.getElementById("ph-content");chips.innerHTML='<div class="spinner" style="margin:0;width:20px;height:20px;border-width:2px;"></div>';try{var regs=await api("getAllRegistrations",{});var my=regs.filter(function(r){return r.ParticipantID===curUser.ParticipantID;});var stats=await api("getStats");var events=(stats.eventStats||[]).filter(function(ev){return my.some(function(r){return r.EventID===ev.EventID;});});if(!events.length){chips.innerHTML="";content.innerHTML='<div class="empty">参加イベントの写真がここに表示されます</div>';return;}chips.innerHTML=events.map(function(ev,i){return'<button class="flt'+(i===0?" on":"")+'" onclick="selPhEv(\''+esc(ev.EventID)+'\',this)">'+esc(ev.EventName)+'</button>';}).join("");renderPhGrid(events[0].EventID);}catch(e){chips.innerHTML="";}}
function selPhEv(eid,btn){document.querySelectorAll("#ph-chips .flt").forEach(function(c){c.classList.remove("on");});if(btn)btn.classList.add("on");renderPhGrid(eid);}
function renderPhGrid(eid){var el=document.getElementById("ph-content");var photos=(lsGet("cpa_photos")||[]).filter(function(p){return p.eventId===eid;});var h='<div class="upload-zone" onclick="document.getElementById(\'ph-fin\').click()"><div class="upload-text">クリックして写真をアップロード<br><strong>JPG / PNG / WebP</strong></div></div><input type="file" id="ph-fin" accept="image/*" multiple style="display:none;" onchange="phUpload(this,\''+esc(eid)+'\')">';if(photos.length)h+='<div class="ph-grid">'+photos.map(function(p){return'<div class="ph-item" onclick="openPV(\''+p.url.replace(/'/g,"\\'")+'\')" ><img src="'+p.url+'" alt="" loading="lazy"><div class="ph-overlay"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div></div>';}).join("")+'</div>';else h+='<div class="empty">写真なし</div>';el.innerHTML=h;}
function phUpload(inp,eid){var files=Array.from(inp.files||[]);files.forEach(function(f){if(f.size>10*1024*1024)return;var r=new FileReader();r.onload=function(e){var all=lsGet("cpa_photos")||[];all.push({id:Date.now(),eventId:eid,name:f.name,url:e.target.result,uploadedAt:new Date().toISOString()});lsSet("cpa_photos",all);renderPhGrid(eid);};r.readAsDataURL(f);});inp.value="";}
function openPV(url){document.getElementById("pv-img").src=url;document.getElementById("pv").classList.add("on");}

// i18n
function applyI18n(){document.querySelectorAll("[data-i18n]").forEach(function(el){var k=el.getAttribute("data-i18n");var v=t(k);if(v&&v!==k)el.textContent=v;});document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el){var k=el.getAttribute("data-i18n-placeholder");var v=t(k);if(v)el.placeholder=v;});}
function setLang(l){curLang=l;localStorage.setItem("lang",l);document.getElementById("lang-sel").value=l;document.documentElement.dir=RTL.includes(l)?"rtl":"ltr";document.documentElement.lang=l;applyI18n();if(allEv.length)renderEvents();}

// INIT
(async function(){var saved=sessionStorage.getItem("auth_user");if(saved){try{curUser=JSON.parse(saved);updateHdr(curUser);}catch(e){updateHdr(null);}}else updateHdr(null);await loadEvents();setLang(curLang);
  // Watch for mypage
  var obs=new MutationObserver(function(){if(curPage==="pg-mypage"&&curUser)loadMyPage();});obs.observe(document.getElementById("pg-mypage"),{attributes:true,attributeFilter:["class"]});
  setInterval(async function(){if(curPage==="pg-landing"){try{var[ev,regs]=await Promise.all([api("getEvents"),curUser?api("getAllRegistrations",{}):Promise.resolve([])]);allEv=ev||[];myRegs=curUser?regs.filter(function(r){return r.ParticipantID===curUser.ParticipantID;}):[];renderEvents();if(calVis)renderCal();}catch(e){}}},30000);
})();
</script>
